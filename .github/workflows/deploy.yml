name: Deploy site

on:
  push:
    branches:
      - master
      - main
    paths:
      - "index.html"
      - "assets/**"
      - ".nojekyll"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages-deploy"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Assemble static site 📦
        run: |
          mkdir -p dist/assets
          cp index.html dist/
          touch dist/.nojekyll
          cp -r assets/css dist/assets/css
          cp -r assets/pdf dist/assets/pdf
          mkdir -p dist/assets/js
          cp assets/js/main.js dist/assets/js/main.js

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
